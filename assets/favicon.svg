<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="20" fill="#0A0A0B"/>

  <!-- Glowing cyan outline for the shield/AI shape -->
  <path d="M50 15 L20 30 V50 C20 70 35 85 50 90 C65 85 80 70 80 50 V30 Z" 
        fill="none" 
        stroke="#22D3EE" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
        
  <!-- Glowing purple center or lightning bolt -->
  <path d="M48 28 L35 55 H52 L50 72 L65 45 H48 Z" 
        fill="#8B5CF6"/>
        
  <!-- Subtle highlight effects -->
  <circle cx="50" cy="50" r="30" fill="url(#core-glow)" style="mix-blend-mode: screen;" opacity="0.6"/>

  <defs>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
